<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  $if(description)$
  <meta name="description" content="$description$">$endif$
  <meta property="og:title" content="$title$&mdash;Erik Fredner">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Erik Fredner">
  $if(description)$
  <meta property="og:description" content="$description$">$endif$
  <link rel="preload" href="fonts/EBGaramond-Regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="fonts/EBGaramond-Italic.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="style.css">
  <link rel="alternate" type="application/atom+xml" href="/feed.xml" title="Erik Fredner">
  <!-- Goat Counter -->
  <script data-goatcounter="https://erik.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
  <title>$title$&mdash;Erik Fredner</title>
</head>

<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <div id="top"></div>
  <header>
    <nav aria-label="Site navigation">
      <ul>
        <li><a href="index.html"><strong>Erik Fredner</strong></a></li>
      </ul>
      <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
      <ul class="nav-links">
        <li><a href="cv.html">CV</a></li>
        <li><a href="research.html">Research</a></li>
        <li><a href="teaching.html">Teaching</a></li>
        <li><a href="blog.html">Blog</a></li>
      </ul>
    </nav>
  </header>
  <main id="main-content">
    $if(title)$<h1>$title$</h1>$endif$
    $if(toc)$
    <details class="toc-box">
      <summary class="toc-label">Contents</summary>
      $table-of-contents$
    </details>
    $endif$
    $body$
    <a href="#top" class="back-to-top" aria-label="Back to top">&uarr;</a>

    <script>
      // Mobile nav toggle
      (function () {
        var toggle = document.querySelector('.nav-toggle');
        var nav = toggle && toggle.closest('nav');
        if (!toggle || !nav) return;
        toggle.addEventListener('click', function () {
          var open = nav.classList.toggle('open');
          toggle.setAttribute('aria-expanded', String(open));
        });
      })();

      // Show when #top leaves viewport; hide when visible again.
      (function () {
        var btn = document.querySelector('.back-to-top');
        var top = document.querySelector('#top');
        if (!btn || !top) return;

        function show() { btn.classList.add('is-visible'); }
        function hide() { btn.classList.remove('is-visible'); }

        if ('IntersectionObserver' in window) {
          new IntersectionObserver(function (entries) {
            entries[0].isIntersecting ? hide() : show();
          }).observe(top);
        } else {
          // Fallback: threshold scroll position
          window.addEventListener('scroll', function () {
            (window.scrollY || document.documentElement.scrollTop) > 400 ? show() : hide();
          }, { passive: true });
        }
      })();
    </script>
  </main>
  <footer>
    $build-date$ &middot; <a href="mailto:$email$">$email$</a>
  </footer>
</body>

</html>
